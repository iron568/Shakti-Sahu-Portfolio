<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Description -->
    <meta
      name="description"
      content="Official portfolio of Shakti Sahu, Frontend Developer and React specialist building modern web applications."
    />

    <!-- Allow search engines -->
    <meta name="robots" content="index, follow" />

    <!-- Google verification -->
    <meta
      name="google-site-verification"
      content="kFLn0sXWzbMEv4QI9NCM9El9QM3-FLzCN7-ZilLwglQ"
    />

    <!-- Open Graph (for social media preview) -->
    <meta
      property="og:title"
      content="Shakti Sahu | Frontend Developer Portfolio"
    />
    <meta
      property="og:description"
      content="Frontend Developer & React Specialist Portfolio Website"
    />
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://shakti-sahu-portfolio.vercel.app"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- Title -->
    <title>Shakti Sahu | Frontend Developer Portfolio</title>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
